<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Farewell, Mrs Muhammad</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Inter:wght@200;300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none; }
        :root {
            --bg: #0c0c14; --bg-card: #13131f; --text: #f0ebe3;
            --text-muted: #8a8494; --accent: #c9a84c; --accent-light: #e8d5a3;
            --border: rgba(201,168,76,0.12);
        }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text);
            min-height: 100vh; overflow-x: hidden; -webkit-font-smoothing: antialiased;
        }
        body::before {
            content: ''; position: fixed; top: 40%; left: 50%;
            transform: translate(-50%,-50%); width: 900px; height: 900px;
            background: radial-gradient(circle, rgba(201,168,76,0.04) 0%, transparent 70%);
            pointer-events: none; z-index: 0;
        }

        /* Kill ALL tap highlights site-wide */
        a, button, [role="button"], input, select, textarea,
        .dash-card, .replay-btn, .skip-btn, #math-phase, #cloud-mist,
        #modal-close-btn, #skip-intro, #skip-btn {
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            outline: none;
        }
        *:focus { outline: none; }
        *:focus-visible { outline: none; }

        /* ===== FLOATING MATH SYMBOLS ===== */
        .math-symbol {
            position: fixed; font-family: 'Times New Roman', Georgia, serif;
            pointer-events: none; z-index: 150; opacity: 0;
            animation: floatSym linear infinite; will-change: transform,opacity; user-select: none;
        }
        .math-symbol.basic    { color: rgba(240,235,227,0.06); font-size: 13px; }
        .math-symbol.alevel   { color: rgba(201,168,76,0.10);  font-size: 17px; }
        .math-symbol.unilevel { color: rgba(232,213,163,0.14); font-size: 21px; font-weight: 500; }
        @keyframes floatSym {
            0%   { opacity: 0; transform: translateY(30px) rotate(0deg) scale(0.8); }
            8%   { opacity: 1; transform: translateY(20px) rotate(10deg) scale(1); }
            92%  { opacity: 1; }
            100% { opacity: 0; transform: translateY(-105vh) rotate(360deg) scale(0.8); }
        }

        /* ===== MUSIC CONTROLS ===== */
        #music-controls {
            position: fixed; top: 16px; right: 16px; z-index: 300;
            display: none; align-items: center; gap: 10px;
        }
        #music-controls.visible { display: flex; }
        #mute-btn {
            width: 38px; height: 38px; border-radius: 50%;
            background: rgba(12,12,20,0.75); border: 1px solid var(--border);
            color: var(--accent); cursor: pointer; display: flex;
            align-items: center; justify-content: center;
            transition: background 0.3s, border-color 0.3s;
            -webkit-tap-highlight-color: transparent;
            backdrop-filter: blur(6px);
        }
        #mute-btn:hover { background: rgba(201,168,76,0.15); border-color: rgba(201,168,76,0.4); }
        #mute-btn svg { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

        /* ===== SPLASH SCREEN ===== */
        #splash-screen {
            position: fixed; inset: 0; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 100; background: var(--bg);
            transition: opacity 1s ease, visibility 1s ease; gap: 0;
        }
        #splash-screen.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

        .splash-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(22px,5.5vw,46px); font-weight: 300;
            letter-spacing: 0.04em; text-align: center; margin-bottom: 6px;
            opacity: 0; transition: opacity 0.9s ease;
        }
        .splash-subtitle {
            font-size: 10px; font-weight: 400; letter-spacing: 0.25em;
            text-transform: uppercase; color: var(--accent); margin-bottom: 36px;
            opacity: 0; transition: opacity 0.9s ease;
        }

        #math-phase {
            display: flex; flex-direction: column; align-items: center;
            position: relative; transition: filter 0.6s ease;
        }
        #math-phase.interactive { cursor: pointer; filter: drop-shadow(0 0 20px rgba(201,168,76,0.08)); }
        #math-phase.interactive:hover { filter: drop-shadow(0 0 32px rgba(201,168,76,0.22)); }
        #math-phase.interactive:hover #svg-circle { stroke: rgba(201,168,76,0.85); }

        #math-svg { width: min(280px,70vw); height: min(280px,70vw); }

        @keyframes drawCircle { to { stroke-dashoffset: 0; } }
        @keyframes drawLine117 { to { stroke-dashoffset: 0; } }
        @keyframes drawLine120 { to { stroke-dashoffset: 0; } }
        @keyframes circlePulse {
            0%,100% { stroke: rgba(201,168,76,0.5); }
            50%     { stroke: rgba(201,168,76,0.9); filter: drop-shadow(0 0 10px rgba(201,168,76,0.35)); }
        }
        @keyframes triPulse {
            0%,100% { fill: rgba(201,168,76,0.18); }
            50%     { fill: rgba(201,168,76,0.30); }
        }
        @keyframes svgRipple {
            0%,100% { transform: scale(1); opacity: 0.85; }
            50%     { transform: scale(1.18); opacity: 0; }
        }
        #svg-ripple1 { opacity: 0; transform-box: fill-box; transform-origin: center; }
        #svg-ripple2 { opacity: 0; transform-box: fill-box; transform-origin: center; }
        #svg-ripple1.active { animation: svgRipple 3s ease-in-out infinite; }
        #svg-ripple2.active { animation: svgRipple 3s ease-in-out 1.1s infinite; }
        #svg-circle.drawing  { animation: drawCircle 1.5s cubic-bezier(0.4,0,0.2,1) forwards; }
        #svg-circle.pulse    { animation: circlePulse 0.6s ease; }
        #svg-line-ab.drawing { animation: drawLine117 0.55s ease forwards; }
        #svg-line-bc.drawing { animation: drawLine120 0.48s ease forwards; }
        #svg-line-ca.drawing { animation: drawLine117 0.55s ease forwards; }
        #svg-fill.filled     { fill: rgba(201,168,76,0.18) !important; }
        #svg-fill.pulse      { animation: triPulse 0.6s ease; }

        #formula-display {
            height: 28px; display: flex; align-items: center; justify-content: center;
            margin-top: 18px; transition: opacity 0.5s ease;
        }
        #formula-text {
            font-family: 'Cormorant Garamond', serif; font-style: italic;
            font-size: clamp(14px,3.2vw,18px); font-weight: 400;
            color: var(--accent); letter-spacing: 0.02em;
            text-shadow: 0 0 24px rgba(201,168,76,0.25);
            transition: opacity 0.22s ease; white-space: nowrap;
        }
        #play-hint {
            font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase;
            color: var(--text-muted); margin-top: 20px;
            opacity: 0; transition: opacity 0.8s ease;
        }
        #play-hint.visible { opacity: 0.5; }
        #skip-intro {
            position: absolute; bottom: 28px; left: 50%; transform: translateX(-50%);
            font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase;
            color: var(--text-muted); background: none; border: none;
            font-family: 'Inter', sans-serif; cursor: pointer;
            opacity: 0; transition: opacity 0.5s ease, color 0.3s;
            padding: 6px 12px;
        }
        #skip-intro.visible { opacity: 0.4; }
        #skip-intro:hover   { opacity: 0.8; color: var(--accent); }

        /* ===== EXPERIENCE ===== */
        #experience {
            min-height: 100vh; padding: 48px 20px 100px;
            display: flex; flex-direction: column; align-items: center;
            opacity: 0; transition: opacity 0.8s ease; position: relative; z-index: 2;
        }
        #experience.visible { opacity: 1; }
        #video-section {
            width: 100%; max-width: 800px; margin-bottom: 64px;
            transition: opacity 0.8s ease, transform 0.8s ease;
        }
        #video-section.hidden { opacity: 0; transform: scale(0.96); pointer-events: none; height: 0; overflow: hidden; margin: 0; }
        .video-wrapper {
            position: relative; width: 100%; aspect-ratio: 16/9; border-radius: 14px;
            overflow: hidden; border: 1px solid var(--border); background: #000;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        #video-player { width: 100%; height: 100%; }
        .video-controls { display: flex; align-items: center; justify-content: center; gap: 14px; margin-top: 22px; flex-wrap: wrap; }
        .video-dots { display: flex; gap: 8px; }
        .video-dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(201,168,76,0.15); transition: all 0.4s ease; }
        .video-dot.active    { background: var(--accent); box-shadow: 0 0 10px rgba(201,168,76,0.4); transform: scale(1.2); }
        .video-dot.completed { background: var(--accent); opacity: 0.4; }
        .video-progress-text { font-size: 11px; letter-spacing: 0.12em; color: var(--text-muted); text-transform: uppercase; }
        .skip-btn {
            background: none; border: none; color: var(--text-muted);
            font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
            cursor: pointer; transition: color 0.3s; font-family: 'Inter', sans-serif; padding: 4px 8px;
        }
        .skip-btn:hover { color: var(--accent); }

        #image-section {
            width: 100%; max-width: 800px; margin-bottom: 64px; text-align: center;
            opacity: 0; transform: translateY(40px) scale(0.94);
            transition: all 1.4s cubic-bezier(0.16,1,0.3,1);
        }
        #image-section.visible { opacity: 1; transform: translateY(0) scale(1); }
        #image-section img {
            width: 100%; max-width: 620px; border-radius: 14px;
            border: 1px solid var(--border); box-shadow: 0 24px 70px rgba(0,0,0,0.55);
        }

        #messages-section { width: 100%; max-width: 680px; display: flex; flex-direction: column; gap: 36px; }
        .message-card {
            background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px;
            padding: 44px 36px; position: relative; opacity: 0; transform: translateY(36px);
            transition: all 1.2s cubic-bezier(0.16,1,0.3,1); box-shadow: 0 10px 40px rgba(0,0,0,0.25);
        }
        .message-card.visible { opacity: 1; transform: translateY(0); }
        .message-card::before {
            content: '\201C'; position: absolute; top: 14px; left: 26px;
            font-family: 'Cormorant Garamond', serif; font-size: 64px;
            color: var(--accent); opacity: 0.15; line-height: 1;
        }
        .message-card p {
            font-family: 'Cormorant Garamond', serif; font-size: clamp(16px,3.2vw,21px);
            font-weight: 400; line-height: 1.85; color: var(--text); font-style: italic; white-space: pre-line;
        }
        .message-card .signature {
            font-family: 'Cormorant Garamond', serif; font-style: normal; font-weight: 500;
            color: var(--accent); margin-top: 24px; font-size: clamp(16px,3vw,20px);
        }
        .experience-footer { margin-top: 64px; display: flex; justify-content: center; opacity: 0; transition: opacity 1s ease 0.5s; }
        .experience-footer.visible { opacity: 1; }
        .footer-line { width: 60px; height: 1px; background: linear-gradient(90deg, transparent, var(--accent), transparent); }

        /* ===== DASHBOARD ===== */
        #dashboard { min-height: 100vh; padding: 60px 20px 90px; position: relative; z-index: 2; display: none; }
        #dashboard.visible { display: block; animation: fadeUp 0.8s ease; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
        .dash-header { text-align: center; margin-bottom: 52px; }
        .dash-header h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(30px,7vw,54px); font-weight: 300; letter-spacing: 0.02em; margin-bottom: 10px; }
        .dash-header p  { font-size: 11px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--accent); }
        .dash-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(270px,1fr)); gap: 18px; max-width: 940px; margin: 0 auto 52px; }
        .dash-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; cursor: pointer; transition: all 0.4s ease; -webkit-tap-highlight-color: transparent; }
        .dash-card:hover { border-color: rgba(201,168,76,0.3); transform: translateY(-5px); box-shadow: 0 14px 44px rgba(0,0,0,0.35); }
        .dash-card-thumb { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; background: #1a1a2a; }
        .dash-card-body  { padding: 16px 20px; }
        .dash-card-label { font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--accent); margin-bottom: 5px; }
        .dash-card-title { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 500; }
        .dash-card-msg   { padding: 24px 20px; }
        .dash-card-msg p { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 15px; color: var(--text-muted); line-height: 1.65; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .replay-btn { display: block; margin: 0 auto; padding: 14px 36px; background: rgba(201,168,76,0.08); border: 1px solid rgba(201,168,76,0.5); color: var(--accent); font-family: 'Inter', sans-serif; font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; border-radius: 8px; cursor: pointer; transition: all 0.3s ease; }
        .replay-btn:hover { background: rgba(201,168,76,0.18); box-shadow: 0 0 24px rgba(201,168,76,0.12); }

        /* ===== MISTY CLOUD EASTER EGG ===== */
        #cloud-egg {
            position: relative; width: 100%; max-width: 940px;
            margin: 52px auto 0; display: flex; flex-direction: column; align-items: center;
        }
        #cloud-mist {
            position: relative; width: min(320px, 88vw); height: 110px; cursor: pointer;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: transform 0.3s ease; -webkit-tap-highlight-color: transparent;
        }
        #cloud-mist:hover { transform: scale(1.04); }
        #cloud-mist:hover #cloud-svg { opacity: 0.85; }
        #cloud-mist:hover .cloud-label { opacity: 1; }
        #cloud-svg {
            position: absolute; inset: 0; width: 100%; height: 100%;
            opacity: 0.65; transition: opacity 0.4s ease;
        }
        .cloud-label {
            position: relative; z-index: 2; text-align: center;
            opacity: 0.8; transition: opacity 0.4s ease; pointer-events: none;
        }
        .cloud-label-main {
            font-family: 'Cormorant Garamond', serif; font-style: italic;
            font-size: clamp(14px, 3.5vw, 17px); font-weight: 400;
            color: var(--accent-light); letter-spacing: 0.02em; line-height: 1.4; display: block;
        }
        .cloud-label-sub {
            font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase;
            color: var(--text-muted); display: block; margin-top: 5px;
        }
        @keyframes cloudPulse {
            0%, 100% { filter: drop-shadow(0 0 18px rgba(201,168,76,0.06)); }
            50%       { filter: drop-shadow(0 0 32px rgba(201,168,76,0.18)); }
        }
        #cloud-mist { animation: cloudPulse 4s ease-in-out infinite; }
        #perk-reveal {
            width: 100%; max-width: 520px; margin-top: 0; overflow: hidden;
            max-height: 0; opacity: 0;
            transition: max-height 1.4s cubic-bezier(0.16,1,0.3,1), opacity 1.1s ease, margin-top 1.4s cubic-bezier(0.16,1,0.3,1);
        }
        #perk-reveal.open { max-height: 900px; opacity: 1; margin-top: 32px; }
        #perk-inner { display: flex; flex-direction: column; align-items: center; padding: 0 16px 24px; }
        #perk-img {
            width: min(420px, 86vw); border-radius: 14px; border: 1px solid var(--border);
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            transform: translateX(60px); opacity: 0; display: block;
            transition: transform 1.2s cubic-bezier(0.16,1,0.3,1) 0.25s, opacity 1.0s ease 0.25s;
        }
        #perk-reveal.open #perk-img { transform: translateX(0); opacity: 1; }
        #perk-caption {
            margin-top: 24px; text-align: center;
            font-family: 'Cormorant Garamond', serif; font-style: italic;
            font-size: clamp(16px, 3.8vw, 22px); font-weight: 400; line-height: 1.7;
            color: var(--text); opacity: 0; transform: translateY(16px);
            transition: opacity 0.9s ease 0.9s, transform 0.9s ease 0.9s;
        }
        #perk-reveal.open #perk-caption { opacity: 1; transform: translateY(0); }
        #perk-caption .perk-sig {
            display: block; font-style: normal; font-weight: 500; color: var(--accent);
            margin-top: 12px; font-size: clamp(14px, 3vw, 18px);
        }
        #cloud-mist.revealed {
            pointer-events: none; animation: none; opacity: 0;
            transition: opacity 0.6s ease; height: 0; overflow: hidden;
        }

        /* ===== MODAL ===== */
        #modal-overlay { position: fixed; inset: 0; background: rgba(6,6,12,0.88); backdrop-filter: blur(10px); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 20px; opacity: 0; visibility: hidden; transition: all 0.4s ease; }
        #modal-overlay.visible { opacity: 1; visibility: visible; }
        .modal-content { width: 100%; max-width: 820px; max-height: 90vh; overflow-y: auto; background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; position: relative; transform: scale(0.92) translateY(24px); transition: transform 0.45s cubic-bezier(0.16,1,0.3,1); }
        #modal-overlay.visible .modal-content { transform: scale(1) translateY(0); }
        .modal-close { position: absolute; top: 12px; right: 12px; z-index: 10; width: 38px; height: 38px; border-radius: 50%; background: rgba(0,0,0,0.55); border: 1px solid rgba(255,255,255,0.08); color: var(--text); font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.3s; font-family: 'Inter', sans-serif; line-height: 1; }
        .modal-close:hover { background: rgba(201,168,76,0.25); border-color: var(--accent); }
        .modal-video-wrap { width: 100%; aspect-ratio: 16/9; }
        .modal-img-wrap   { padding: 24px; text-align: center; }
        .modal-img-wrap img { max-width: 100%; border-radius: 10px; }
        .modal-messages { padding: 44px 36px; display: flex; flex-direction: column; gap: 36px; }
        .modal-msg { position: relative; }
        .modal-msg::before { content: '\201C'; position: absolute; top: -12px; left: -6px; font-family: 'Cormorant Garamond', serif; font-size: 52px; color: var(--accent); opacity: 0.15; line-height: 1; }
        .modal-msg p { font-family: 'Cormorant Garamond', serif; font-size: clamp(15px,2.8vw,20px); font-weight: 400; line-height: 1.85; font-style: italic; white-space: pre-line; }
        .modal-msg .sig { font-style: normal; font-weight: 500; color: var(--accent); margin-top: 18px; font-family: 'Cormorant Garamond', serif; font-size: clamp(15px,2.5vw,19px); }
        .modal-loading { padding: 60px 20px; text-align: center; font-size: 13px; color: var(--text-muted); letter-spacing: 0.05em; }
        .modal-loading a { color: var(--accent); text-decoration: underline; }

        @media (max-width: 640px) {
            .message-card { padding: 36px 24px; }
            .modal-messages { padding: 36px 22px; }
            .dash-grid { grid-template-columns: 1fr 1fr; gap: 12px; }
            .dash-card-body { padding: 12px 14px; }
            .dash-card-title { font-size: 16px; }
            #experience { padding: 32px 16px 80px; }
            #perk-img { width: min(340px, 90vw); }
            #music-controls { top: 10px; right: 10px; }
        }
        @media (max-width: 400px) { .dash-grid { grid-template-columns: 1fr; } }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: rgba(201,168,76,0.18); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(201,168,76,0.35); }
        ::selection { background: rgba(201,168,76,0.25); color: #fff; }
    </style>
</head>
<body>

<!-- ====== MUSIC CONTROLS (mute button) ====== -->
<div id="music-controls">
    <button id="mute-btn" aria-label="Toggle music">
        <!-- Speaker icon (unmuted) -->
        <svg id="icon-sound" viewBox="0 0 24 24">
            <path d="M11 5L6 9H2v6h4l5 4V5z"/>
            <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
        </svg>
        <!-- Muted icon (hidden by default) -->
        <svg id="icon-muted" viewBox="0 0 24 24" style="display:none">
            <path d="M11 5L6 9H2v6h4l5 4V5z"/>
            <line x1="23" y1="9" x2="17" y2="15"/>
            <line x1="17" y1="9" x2="23" y2="15"/>
        </svg>
    </button>
</div>

<!-- ====== SPLASH SCREEN ====== -->
<div id="splash-screen">
    <div class="splash-title" id="sp-title">Farewell, Mrs Muhammad</div>
    <div class="splash-subtitle" id="sp-sub">A tribute to the greatest maths teacher!</div>

    <div id="math-phase">
        <svg id="math-svg" viewBox="-120 -120 240 240" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <pattern id="gp" width="30" height="30" patternUnits="userSpaceOnUse">
                    <path d="M 30 0 L 0 0 0 30" fill="none" stroke="rgba(240,235,227,0.03)" stroke-width="0.5"/>
                </pattern>
            </defs>
            <rect id="svg-grid" x="-120" y="-120" width="240" height="240" fill="url(#gp)" style="opacity:0;transition:opacity 0.7s"/>
            <g id="svg-mgrid" style="opacity:0;transition:opacity 0.7s">
                <line x1="-60" y1="-115" x2="-60" y2="115" stroke="rgba(240,235,227,0.055)" stroke-width="0.5"/>
                <line x1="60"  y1="-115" x2="60"  y2="115" stroke="rgba(240,235,227,0.055)" stroke-width="0.5"/>
                <line x1="-115" y1="-60" x2="115" y2="-60" stroke="rgba(240,235,227,0.055)" stroke-width="0.5"/>
                <line x1="-115" y1="60"  x2="115" y2="60"  stroke="rgba(240,235,227,0.055)" stroke-width="0.5"/>
            </g>
            <g id="svg-axes" style="opacity:0;transition:opacity 0.7s">

function initBgMusic() {
    bgAudio = new Audio('music.mp3');
    bgAudio.loop   = true;
    bgAudio.volume = bgVolume;
    bgAudio.preload = 'auto';

    // Show mute button
    document.getElementById('music-controls').classList.add('visible');

    // Mute button logic
    document.getElementById('mute-btn').addEventListener('click', function() {
        bgMuted = !bgMuted;
        if (bgAudio) bgAudio.muted = bgMuted;
        document.getElementById('icon-sound').style.display = bgMuted ? 'none'  : '';
        document.getElementById('icon-muted').style.display = bgMuted ? ''      : 'none';
    });

    // Try to play immediately; browsers may block until user interacts
    var playAttempt = bgAudio.play();
    if (playAttempt !== undefined) {
        playAttempt.catch(function() {
            // Autoplay blocked — play on first user interaction
            var resume = function() {
                bgAudio.play().catch(function(){});
                document.removeEventListener('click', resume);
                document.removeEventListener('touchstart', resume);
                document.removeEventListener('keydown', resume);
            };
            document.addEventListener('click', resume);
            document.addEventListener('touchstart', resume);
            document.addEventListener('keydown', resume);
        });
    }
}

// Duck music while a YT video plays, restore when it pauses/ends
function duckMusic() {
    if (!bgAudio || videoDucked) return;
    videoDucked = true;
    fadeBgVolume(0.04, 800);
}

function unduckMusic() {
    if (!bgAudio || !videoDucked) return;
    videoDucked = false;
    fadeBgVolume(bgVolume, 1200);
}

function fadeBgVolume(target, duration) {
    if (!bgAudio) return;
    var start  = bgAudio.volume;
    var delta  = target - start;
    var steps  = 30;
    var stepMs = duration / steps;
    var i = 0;
    var t = setInterval(function() {
        i++;
        var v = start + delta * (i / steps);
        bgAudio.volume = Math.max(0, Math.min(1, v));
        if (i >= steps) clearInterval(t);
    }, stepMs);
}

function stopBgMusic() {
    if (!bgAudio) return;
    fadeBgVolume(0, 600);
    setTimeout(function() {
        if (bgAudio) { bgAudio.pause(); bgAudio.currentTime = 0; }
        document.getElementById('music-controls').classList.remove('visible');
    }, 650);
}

var SYMS = {

    alevel:   ['∑','∫','∂','Δ','θ','α','β','sin','cos','tan','log','ln','lim','dy/dx','σ','λ','φ','ω','ε'],

function spawnSymbols() {
    var all = [];
    Object.keys(SYMS).forEach(function(k) {
        SYMS[k].forEach(function(s) { all.push({ s: s, k: k }); });
    });
    var n = window.innerWidth < 768 ? 22 : 38;
    var frag = document.createDocumentFragment();
    for (var i = 0; i < n; i++) {
        var it = all[Math.floor(Math.random() * all.length)];
        var el = document.createElement('div');
        el.className = 'math-symbol ' + it.k;
        el.textContent = it.s;
        el.style.left = (Math.random() * 96 + 2) + '%';
        el.style.top  = (Math.random() * 96 + 2) + '%';
        el.style.animationDuration = (18 + Math.random() * 28) + 's';
        el.style.animationDelay    = (Math.random() * 22) + 's';
        frag.appendChild(el);
    }
    document.body.appendChild(frag);
}

function setOp(id, v) { var e = document.getElementById(id); if (e) e.style.opacity = v; }
function addCls(id, c) { var e = document.getElementById(id); if (e) e.classList.add(c); }

function runMathAnimation() {

// ╔══════════════════════════════════════════════════════════════╗
// ║  YOUTUBE API                                                ║

function loadYTAPI() {
    var t = document.createElement('script');
    t.src = 'https://www.youtube.com/iframe_api';
    document.head.appendChild(t);
}

window.onYouTubeIframeAPIReady = function() { apiReady = true; };

function makePlayer(containerId, videoId, opts) {
    opts = opts || {};
    var vars = { autoplay: opts.autoplay !== false ? 1 : 0, controls: opts.controls !== false ? 1 : 0, modestbranding: 1, rel: 0, showinfo: 0, playsinline: 1 };
    if (opts.loop) { vars.loop = 1; vars.playlist = videoId; }
    return new YT.Player(containerId, { height: '100%', width: '100%', videoId: videoId, playerVars: vars, events: opts.events || {} });
}

function stopVideoPlayer(player) {
    if (!player) return;
    try { player.stopVideo(); } catch(e) {}
    try { player.destroy(); } catch(e) {}
}

function validVideos() {
    return YOUTUBE_VIDEOS.filter(function(id) { return id && id.indexOf(PH) !== 0; });
}


// ╔══════════════════════════════════════════════════════════════╗
// ║  EXPERIENCE FLOW                                            ║
// ╚══════════════════════════════════════════════════════════════╝

function startExperience() {
    if (started) return;
    started = true;
    document.getElementById('splash-screen').classList.add('hidden');

    setTimeout(function() {
        document.getElementById('experience').classList.add('visible');

        // Start background music
        initBgMusic();

        var vv = validVideos();
        if (vv.length > 0 && apiReady) {
            buildDots(vv.length);
            videoPlayer = makePlayer('video-player', vv[0], {
                events: {
                    onStateChange: function(e) {
                        if (e.data === YT.PlayerState.PLAYING) {
                            duckMusic();
                        } else if (e.data === YT.PlayerState.PAUSED) {
                            unduckMusic();
                        } else if (e.data === YT.PlayerState.ENDED) {
                            unduckMusic();
                            advanceVideo(vv);
                        }
                    },
                    onError: function() { unduckMusic(); advanceVideo(vv); }
                }
            });
            updateProgress(vv.length);
        } else {
            document.getElementById('video-section').classList.add('hidden');
            setTimeout(showImage, 400);
        }
    }, 700);
}

function buildDots(n) {
    var c = document.getElementById('video-dots'); c.innerHTML = '';
    for (var i = 0; i < n; i++) {
        var d = document.createElement('div');
        d.className = 'video-dot' + (i === 0 ? ' active' : '');
        d.id = 'vdot' + i;
        c.appendChild(d);
    }
}

function updateProgress(n) {
    document.getElementById('vid-progress').textContent = 'Video ' + (currentVideoIndex + 1) + ' of ' + n;
    for (var i = 0; i < n; i++) {
        var d = document.getElementById('vdot' + i);
        if (!d) continue;
        d.className = 'video-dot';
        if (i < currentVideoIndex) d.classList.add('completed');
        if (i === currentVideoIndex) d.classList.add('active');
    }
}

function advanceVideo(vv) {
    var n = vv.length;
    var d = document.getElementById('vdot' + currentVideoIndex);
    if (d) { d.classList.remove('active'); d.classList.add('completed'); }
    currentVideoIndex++;
    if (currentVideoIndex < n) {
        // Stop previous video cleanly then load next
        try { videoPlayer.stopVideo(); } catch(e) {}
        videoPlayer.loadVideoById(vv[currentVideoIndex]);
        updateProgress(n);
    } else {
        hideVideoShowImage();
    }
}

function skipToNext() {
    unduckMusic();
    // Immediately stop video to prevent audio bleed
    try { videoPlayer.stopVideo(); } catch(e) {}
    var vv = validVideos();
    if (vv.length > 0) advanceVideo(vv); else hideVideoShowImage();
}

function hideVideoShowImage() {
    // Stop and destroy the video player
    stopVideoPlayer(videoPlayer);
    videoPlayer = null;
    unduckMusic();
    document.getElementById('video-section').classList.add('hidden');
    setTimeout(showImage, 600);
}

function showImage() {
    var s = document.getElementById('image-section');
    s.classList.add('visible');
    setTimeout(function() { s.scrollIntoView({ behavior: 'smooth', block: 'center' }); }, 300);
    setTimeout(showMessages, 2200);
}

function showMessages() {
    var m1 = document.getElementById('msg-card-1');
    var m2 = document.getElementById('msg-card-2');
    var ft = document.getElementById('exp-footer');
    m1.classList.add('visible');
    setTimeout(function() {
        m2.classList.add('visible');
        setTimeout(function() { m2.scrollIntoView({ behavior: 'smooth', block: 'center' }); }, 200);
    }, 1400);
    setTimeout(function() { ft.classList.add('visible'); }, 2600);
    setTimeout(function() { try { localStorage.setItem('farewell_mrs_muhammad_played', 'true'); } catch(e) {} }, 3000);
}


// ╔══════════════════════════════════════════════════════════════╗
// ║  DASHBOARD                                                  ║
// ╚══════════════════════════════════════════════════════════════╝

function showDashboard() {
    document.getElementById('splash-screen').classList.add('hidden');
    document.getElementById('experience').style.display = 'none';

    // Stop any lingering video
    stopVideoPlayer(videoPlayer);
    videoPlayer = null;

    var g = document.getElementById('dash-grid'); g.innerHTML = '';
    var vv = validVideos();

    vv.forEach(function(vid, i) {
        var card = document.createElement('div'); card.className = 'dash-card';
        card.innerHTML =
            '<img class="dash-card-thumb" src="https://img.youtube.com/vi/' + vid + '/hqdefault.jpg" alt="Video ' + (i+1) + '" loading="lazy">' +
            '<div class="dash-card-body"><div class="dash-card-label">Video ' + (i+1) + ' of ' + vv.length + '</div>' +
            '<div class="dash-card-title">Farewell Message</div></div>';
        card.addEventListener('click', function() { openVideoModal(vid); });
        g.appendChild(card);
    });

    var ic = document.createElement('div'); ic.className = 'dash-card';
    ic.innerHTML = '<img class="dash-card-thumb" src="message.png" alt="Special message" loading="lazy">' +
        '<div class="dash-card-body"><div class="dash-card-label">Photo</div><div class="dash-card-title">A Special Message</div></div>';
    ic.addEventListener('click', openImageModal);
    g.appendChild(ic);

    var mc = document.createElement('div'); mc.className = 'dash-card';
    mc.innerHTML = '<div class="dash-card-msg"><div class="dash-card-label">Messages</div><p>' + MESSAGE_1_TEXT.substring(0, 130) + '…</p></div>';
    mc.addEventListener('click', openMessagesModal);
    g.appendChild(mc);

    document.getElementById('dashboard').classList.add('visible');

    // Start background music on dashboard too
    initBgMusic();

    setTimeout(initCloudEgg, 400);
}

function replayExperience() {
    try { localStorage.removeItem('farewell_mrs_muhammad_played'); } catch(e) {}
    // Stop music before reload
    if (bgAudio) { bgAudio.pause(); }
    location.reload();
}


// ╔══════════════════════════════════════════════════════════════╗
// ║  MODAL                                                      ║
// ╚══════════════════════════════════════════════════════════════╝

function openModal() {
    document.getElementById('modal-overlay').classList.add('visible');
    document.body.style.overflow = 'hidden';
}

function closeModal() {
    // Stop modal video immediately
    if (modalPlayer) {
        try { modalPlayer.stopVideo(); } catch(e) {}
        try { modalPlayer.destroy(); } catch(e) {}
        modalPlayer = null;
    }
    unduckMusic();
    document.getElementById('modal-overlay').classList.remove('visible');
    document.body.style.overflow = '';
    setTimeout(function() { document.getElementById('modal-body').innerHTML = ''; }, 450);
}

function openVideoModal(videoId) {
    var body = document.getElementById('modal-body');
    var uid  = 'mvid_' + Date.now();
    body.innerHTML = '<div class="modal-video-wrap"><div id="' + uid + '"></div></div>';
    openModal();
    if (apiReady) {
        setTimeout(function() {
            modalPlayer = makePlayer(uid, videoId, {
                events: {
                    onStateChange: function(e) {
                        if (e.data === YT.PlayerState.PLAYING) duckMusic();
                        else if (e.data === YT.PlayerState.PAUSED || e.data === YT.PlayerState.ENDED) unduckMusic();
                    },
                    onError: function() {
                        unduckMusic();
                        body.innerHTML = '<div class="modal-loading">Unable to load video.<br>' +
                            '<a href="https://www.youtube.com/watch?v=' + videoId + '" target="_blank">Watch on YouTube →</a></div>';
                    }
                }
            });
        }, 350);
    } else {
        body.innerHTML = '<div class="modal-loading">YouTube API not available.<br>' +
            '<a href="https://www.youtube.com/watch?v=' + videoId + '" target="_blank">Watch on YouTube →</a></div>';
    }
}

function openImageModal() {
    document.getElementById('modal-body').innerHTML = '<div class="modal-img-wrap"><img src="message.png" alt="A special message"></div>';
    openModal();
}

function openMessagesModal() {
    document.getElementById('modal-body').innerHTML =
        '<div class="modal-messages">' +
            '<div class="modal-msg"><p>' + MESSAGE_1_TEXT.replace(/\n/g, '<br>') + '</p><div class="sig">' + MESSAGE_1_NAME + '</div></div>' +
            '<div class="modal-msg"><p>' + MESSAGE_2_TEXT.replace(/\n/g, '<br>') + '</p><div class="sig">' + MESSAGE_2_NAME + '</div></div>' +
        '</div>';
    openModal();
}


// ╔══════════════════════════════════════════════════════════════╗
// ║  INIT                                                       ║
// ╚══════════════════════════════════════════════════════════════╝

(function init() {
    document.getElementById('msg-text-1').textContent = MESSAGE_1_TEXT;
    document.getElementById('msg-name-1').textContent = MESSAGE_1_NAME;
    document.getElementById('msg-text-2').textContent = MESSAGE_2_TEXT;
    document.getElementById('msg-name-2').textContent = MESSAGE_2_NAME;

    spawnSymbols();

    document.getElementById('skip-btn').addEventListener('click', skipToNext);
    document.getElementById('skip-intro').addEventListener('click', skipToClean);
    document.getElementById('replay-btn').addEventListener('click', replayExperience);
    document.getElementById('modal-close-btn').addEventListener('click', closeModal);
    document.getElementById('modal-overlay').addEventListener('click', function(e) {
        if (e.target === this) closeModal();
    });
    document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeModal(); });

    try {
        if (localStorage.getItem('farewell_mrs_muhammad_played') === 'true') {
            showDashboard();
            loadYTAPI();
            return;
        }
    } catch(e) {}

    loadYTAPI();
    runMathAnimation();

    setTimeout(function() {
        if (!apiReady && started) hideVideoShowImage();
    }, 12000);
})();
</script>
</body>
